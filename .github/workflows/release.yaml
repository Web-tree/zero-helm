name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint . --values ci/test-values.yaml

      - name: Package chart
        run: helm package . --destination .cr-release-packages

      - name: Upload chart to GitHub Release
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            .cr-release-packages/*.tgz --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        run: gh release edit "${{ needs.release-please.outputs.tag_name }}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Helm repo index
        run: |
          REPO_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.release-please.outputs.tag_name }}"
          # Fetch existing index from gh-pages if it exists
          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git show gh-pages:index.yaml > existing-index.yaml 2>/dev/null || true
          if [ -f existing-index.yaml ] && [ -s existing-index.yaml ]; then
            helm repo index .cr-release-packages --url "$REPO_URL" --merge existing-index.yaml
          else
            helm repo index .cr-release-packages --url "$REPO_URL"
          fi
          rm -f existing-index.yaml

      - name: Push index to gh-pages
        run: |
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf --ignore-unmatch . 2>/dev/null || true
          cp .cr-release-packages/index.yaml index.yaml
          git add index.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update Helm repo index for ${{ needs.release-please.outputs.tag_name }}"
          git push origin gh-pages
