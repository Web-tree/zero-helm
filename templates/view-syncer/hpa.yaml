{{- if and .Values.viewSyncer.enabled .Values.viewSyncer.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "zero.viewSyncer.fullname" . }}
  labels:
    {{- include "zero.viewSyncer.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    {{- if .Values.viewSyncer.persistence.enabled }}
    kind: StatefulSet
    {{- else }}
    kind: Deployment
    {{- end }}
    name: {{ include "zero.viewSyncer.fullname" . }}
  minReplicas: {{ .Values.viewSyncer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.viewSyncer.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.viewSyncer.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.viewSyncer.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.viewSyncer.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.viewSyncer.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
  {{- with .Values.viewSyncer.autoscaling.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
